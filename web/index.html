<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chromesthesia - Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=VT323&display=swap" rel="stylesheet">
<link href="./css/style.css" rel="stylesheet">
</head>
<body>
<canvas id="gl"></canvas>
<div id="crt"></div>

<!-- 12 pitch-class labels, A at 12 o'clock, positioned by main.js -->
<div id="wheel"></div>

<div id="chordbox">
  <div id="chordname" style="opacity: 1;"></div>
  <div id="impliedchord"></div>
</div>

<header>
  <span class="title">Chromesthesia</span>
  <span class="modeswitch">
    <button id="modeMidiBtn" class="modebtn active">MIDI</button>
    <button id="modeMicBtn" class="modebtn">Mic</button>
  </span>
  <!-- audio input picker: shown only in mic mode, and only when >1 input exists -->
  <select id="micSource" class="micsource" hidden aria-label="Audio input source"></select>
  <span class="chip" id="statusChip"><span class="led"></span><span id="statusText">no midi</span></span>
</header>

<div id="dsp" class="panel">
  <span class="bk"></span>
  <div class="panelbar">
    <span class="label">Settings</span>
    <button id="minBtn" title="collapse/expand">–</button>
  </div>
  <div id="celPanel"></div>
  <div id="micPanel"></div>
</div>

<div class="hint" id="hint">
  <div class="hintbar">
    <span class="hintlabel">Notes / Help</span>
    <button id="hintMinBtn" title="collapse/expand">–</button>
  </div>
  <div id="notesReadout" class="readout">no notes</div>
  <div class="hintbody">
    Plug in a MIDI device, or play the on-screen keys:
    <b>a s d f g h j k l</b> (white), <b>w e t y u o p</b> (black),
    <b>z / x</b> octave down/up.
  </div>
</div>

<!-- modules: order matters (globals) -->
<script src="./js/note-colours.js"></script>
<script src="./js/key-spelling.js"></script>
<script src="./js/chord-qualities.js"></script>
<script src="./js/chord.js"></script>
<script src="./js/visualizer.js"></script>
<script src="./js/midi-input.js"></script>
<script src="./js/keyboard-input.js"></script>
<script src="./js/mic-input.js"></script>
<script src="./js/debug-panel.js"></script>
<script src="./js/main.js"></script>
</body>
</html>
